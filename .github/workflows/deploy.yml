name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: |
          [ -d src/app/api ] && mv src/app/api /tmp/api-routes-bak
          [ -d src/app/tokens ] && mv src/app/tokens /tmp/tokens-pages-bak
          npm run build
          [ -d /tmp/api-routes-bak ] && mv /tmp/api-routes-bak src/app/api
          [ -d /tmp/tokens-pages-bak ] && mv /tmp/tokens-pages-bak src/app/tokens
        env:
          PAGES_EXPORT: "true"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
